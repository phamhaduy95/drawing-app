<svg class="scada-icon"
	xmlns="http://www.w3.org/2000/svg"
	viewBox="0 0 100 100"
	width="100%"
	height="100%"
	fill="none"
	stroke="gray"
	stroke-width="1"
	stroke-linecap="square"
	stroke-linejoin="miter"


>
	<style>
		.scada-icon * {
			vector-effect: non-scaling-stroke;
		}
	</style>
	<!-- Legs -->
	<path d="M 30 85 L 25 95 M 20 95 L 30 95" stroke-linejoin="miter" />
	<path d="M 60 85 L 65 95 M 60 95 L 70 95" stroke-linejoin="miter" />
  
  <!-- Tank Body -->
  <rect x="15" y="10" width="60" height="75" rx="15" />
  
  <!-- Weld Seams -->
  <line x1="15" y1="35" x2="75" y2="35" stroke-width="1" stroke-dasharray="4 2" />
  <line x1="15" y1="60" x2="75" y2="60" stroke-width="1" stroke-dasharray="4 2" />
  
  <!-- Manway / Access Hatch -->
  <ellipse cx="45" cy="66" rx="8" ry="5" stroke-width="1" />
  <circle cx="45" cy="66" r="1.5" fill="gray" stroke="none" />
  
  <!-- Top Vent/Connection -->
  <path d="M 40 10 L 40 4 M 50 10 L 50 4" stroke-width="1" />
  <line x1="36" y1="4" x2="54" y2="4" stroke-width="1" />
  
  <!-- Sight Glass (Level Indicator) -->
  <rect x="83" y="25" width="6" height="45" rx="3" stroke-width="1" />
  <!-- Sight glass connections -->
  <line x1="75" y1="32" x2="83" y2="32" stroke-width="1" />
  <line x1="75" y1="63" x2="83" y2="63" stroke-width="1" />
  <!-- Liquid level tick -->
  <line x1="84" y1="45" x2="88" y2="45" stroke-width="1" />
</svg>
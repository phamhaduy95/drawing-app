<svg class="scada-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="36px" height="36px" fill="none" stroke="gray" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
	<style>
		.scada-icon * {
			vector-effect: non-scaling-stroke;
		}
	</style>
  <!-- Main Pipe Body -->
  <rect x="20" y="60" width="60" height="20" />
  <!-- Side Flanges -->
  <rect x="10" y="50" width="10" height="40" />
  <rect x="80" y="50" width="10" height="40" />
  <!-- Center Bonnet -->
  <rect x="40" y="45" width="20" height="15" />
  <!-- Valve Stem -->
  <line x1="50" y1="45" x2="50" y2="20" />
  <!-- Handwheel Handle -->
  <line x1="30" y1="20" x2="70" y2="20" stroke-width="1" />
  <!-- Handwheel Nut/Top -->
  <rect x="40" y="10" width="20" height="10" />
</svg>

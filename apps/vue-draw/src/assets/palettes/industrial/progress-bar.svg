<svg class="scada-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 40" width="36px" height="36px" fill="none" stroke="gray" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
	<style>
		.scada-icon * {
			vector-effect: non-scaling-stroke;
		}
	</style>
  <!-- Container -->
  <rect x="5" y="5" width="90" height="30" rx="4" />
  <!-- Filled Segments (Representing ~70% full) -->
  <rect x="12" y="12" width="12" height="16" fill="gray" stroke="none" />
  <rect x="28" y="12" width="12" height="16" fill="gray" stroke="none" />
  <rect x="44" y="12" width="12" height="16" fill="gray" stroke="none" />
  <rect x="60" y="12" width="12" height="16" fill="gray" stroke="none" />
  <!-- Empty Segments -->
  <rect x="76" y="12" width="12" height="16" fill="none" stroke-width="1" />
</svg>

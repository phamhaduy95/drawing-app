<svg class="scada-icon" xmlns="http://www.w3.org/2000/svg" width="36px" height="36px" viewBox="0 0 24 24" fill="none" stroke="gray" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
	<style>
		.scada-icon * {
			vector-effect: non-scaling-stroke;
		}
	</style>
	<!-- Text Area Box -->
	<rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
	<!-- Text Lines -->
	<line x1="7" y1="8" x2="17" y2="8"></line>
	<line x1="7" y1="12" x2="15" y2="12"></line>
	<line x1="7" y1="16" x2="12" y2="16"></line>
	<!-- Resize Handle -->
	<line x1="16" y1="19" x2="19" y2="16"></line>
	<line x1="18" y1="19" x2="19" y2="18"></line>
</svg>

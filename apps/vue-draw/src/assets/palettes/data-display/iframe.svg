<svg class="scada-icon"
	xmlns="http://www.w3.org/2000/svg"
	width="100%"
	height="100%"
	viewBox="0 0 102 102"
	fill="none"
	stroke="gray"
	stroke-width="1"
	stroke-linecap="square"
	stroke-linejoin="miter"
>
	<style>
		.scada-icon * {
			vector-effect: non-scaling-stroke;
		}
	</style>
	<!-- Main window -->
	<rect x="10" y="20" width="82" height="62" rx="4" ry="4"></rect>
	<!-- Header line -->
	<line x1="10" y1="34" x2="92" y2="34"></line>
	<!-- Three dots -->
	<circle cx="20" cy="27" r="2" fill="gray" stroke="none"></circle>
	<circle cx="28" cy="27" r="2" fill="gray" stroke="none"></circle>
	<circle cx="36" cy="27" r="2" fill="gray" stroke="none"></circle>
	<!-- Code symbol: < -->
	<polyline points="42,46 32,56 42,66"></polyline>
	<!-- Code symbol: / -->
	<line x1="54" y1="42" x2="48" y2="70"></line>
	<!-- Code symbol: > -->
	<polyline points="60,46 70,56 60,66"></polyline>
</svg>
